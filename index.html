<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeLife Properties CRM</title>

    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <div class="sidebar">

            <h2>🏠 PrimeLife</h2>

            <ul>
                <li><i class="fa fa-chart-line"></i> Dashboard</li>
                <li><i class="fa fa-users"></i> Clients</li>
                <li><i class="fa fa-building"></i> Properties</li>
                <li><i class="fa fa-phone"></i> Follow-ups</li>
            </ul>

        </div>

        <!-- Main Content -->
        <div class="main-content">

            <!-- Top Bar -->
            <div class="topbar">

                <h1>PrimeLife Properties CRM</h1>

            </div>

            <!-- Cards -->
            <div class="cards">

                <div class="card">
                    <h3>Total Clients</h3>

                </div>

                <div class="card">
                    <h3>Total Properties</h3>

                </div>

                <div class="card">
                    <h3>Pending Follow-ups</h3>

                </div>

            </div>

            <!-- Client Form -->
            <form id="clientForm">

                <input type="text" id="clientName" placeholder="Client Name" required>

                <input type="text" id="clientPhone" placeholder="Phone Number" required>

                <input type="text" id="clientBudget" placeholder="Budget" required>

                <input type="text" id="clientLocation" placeholder="Preferred Location" required>

                <select id="clientRequirement">

                    <option value="">Requirement Type</option>
                    <option>1BHK</option>
                    <option>2BHK</option>
                    <option>3BHK</option>
                    <option>Villa</option>
                    <option>Plot</option>

                </select>
                <input type="text" id="clientRemarks" placeholder="Remarks / Follow-up" />

                <button type="submit">
                    Add Client
                </button>

            </form>

        </div>

        <!-- Table -->
        <div class="table-section">

            <h2>Recent Clients</h2>
            <input type="text" id="searchInput" placeholder="Search clients..." class="search-box" />

            <table>

                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Budget</th>
                        <th>Location</th>
                        <th>Requirement</th>
                        <th>Remarks</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="clientTableBody">

                </tbody>
            </table>

        </div>

    </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
